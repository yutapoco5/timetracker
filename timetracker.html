<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="タイムトラッカー">
<meta name="theme-color" content="#5b6af0">
<title>タイムトラッカー</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Segoe UI', sans-serif;
  background: #f0f2f5;
  color: #1a1a2e;
  max-width: 600px;
  margin: 0 auto;
  min-height: 100%;
  position: relative;
}

/* ナビ（下固定） */
.nav {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%; max-width: 600px;
  background: #fff;
  border-top: 1px solid #e8e8e8;
  display: flex;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  flex: 1; padding: 10px 0 8px;
  border: none; background: none;
  font-size: 11px; color: #aaa;
  cursor: pointer; display: flex;
  flex-direction: column; align-items: center; gap: 3px;
}
.nav-btn.active { color: #5b6af0; font-weight: 600; }
.nav-icon { font-size: 22px; line-height: 1; }

/* ページラッパー */
.page { display: none; padding-bottom: calc(64px + env(safe-area-inset-bottom)); }
.page.active { display: block; }

/* ヘッダー */
.header {
  background: linear-gradient(135deg, #5b6af0, #7c5cbf);
  color: #fff;
  padding: calc(env(safe-area-inset-top) + 16px) 16px 16px;
}
.header-date { font-size: 13px; opacity: 0.8; margin-bottom: 3px; }
.header-title { font-size: 20px; font-weight: 700; }
.header-sub { font-size: 12px; opacity: 0.7; margin-top: 2px; min-height: 16px; }

/* タスクリスト */
.task-list { padding: 14px 14px 0; display: flex; flex-direction: column; gap: 10px; }
.task-card {
  background: #fff; border-radius: 16px;
  padding: 14px 12px; display: flex;
  align-items: center; gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  cursor: pointer; transition: transform 0.12s;
  border: 2px solid transparent;
}
.task-card:active { transform: scale(0.97); }
.task-card.running { border-color: #5b6af0; box-shadow: 0 4px 18px rgba(91,106,240,0.25); }
.task-dot { width: 46px; height: 46px; border-radius: 13px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.task-info { flex: 1; min-width: 0; }
.task-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-today-label { font-size: 11px; color: #aaa; margin-top: 2px; }
.task-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.timer-disp { font-size: 17px; font-weight: 700; font-variant-numeric: tabular-nums; color: #ccc; }
.task-card.running .timer-disp { color: #5b6af0; }
.play-btn {
  width: 32px; height: 32px; border-radius: 50%;
  border: none; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
}
.play-btn.start { background: #eef0fe; color: #5b6af0; }
.play-btn.stop  { background: #fff0f0; color: #ff5c5c; }
.del-btn { background: none; border: none; color: #ddd; font-size: 15px; cursor: pointer; padding: 2px 4px; }
.del-btn:active { color: #ff5c5c; }

/* FAB */
.fab {
  position: fixed;
  bottom: calc(64px + env(safe-area-inset-bottom) + 16px);
  right: 20px;
  width: 54px; height: 54px;
  background: #5b6af0; color: #fff;
  border: none; border-radius: 50%;
  font-size: 26px; cursor: pointer;
  box-shadow: 0 4px 18px rgba(91,106,240,0.45);
  z-index: 50;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.1s;
}
.fab:active { transform: scale(0.92); }

/* 空状態 */
.empty-state { text-align: center; padding: 60px 20px; }
.empty-icon { font-size: 56px; margin-bottom: 14px; }
.empty-text { font-size: 15px; color: #bbb; line-height: 1.7; }

/* モーダル */
.modal-overlay {
  display: none; position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.48);
  z-index: 300;
  align-items: flex-end; justify-content: center;
}
.modal {
  background: #fff;
  border-radius: 24px 24px 0 0;
  padding: 22px 18px calc(env(safe-area-inset-bottom) + 32px);
  width: 100%; max-width: 600px;
  max-height: 85vh; overflow-y: auto;
}
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 18px; }
.modal label { font-size: 12px; color: #888; display: block; margin-bottom: 5px; }
.modal input[type="text"] {
  width: 100%; border: 1.5px solid #e0e0e0;
  border-radius: 10px; padding: 11px 13px;
  font-size: 16px; outline: none; margin-bottom: 14px;
  -webkit-appearance: none;
}
.modal input[type="text"]:focus { border-color: #5b6af0; }
.color-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 14px; }
.color-opt { aspect-ratio: 1; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: transform 0.1s; }
.color-opt.selected { border-color: #222; transform: scale(1.18); }
.emoji-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 14px; }
.emoji-opt { aspect-ratio: 1; border-radius: 8px; border: 2px solid #eee; background: #fafafa; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.emoji-opt.selected { border-color: #5b6af0; background: #eef0fe; }
.modal-actions { display: flex; gap: 10px; margin-top: 4px; }
.btn { flex: 1; padding: 13px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
.btn-primary { background: #5b6af0; color: #fff; }
.btn-secondary { background: #f2f2f2; color: #666; }
.btn-danger { background: #fff0f0; color: #ff5c5c; }

/* グラフページ */
.period-scroll {
  background: #fff;
  border-bottom: 1px solid #eee;
  padding: 10px 14px;
  display: flex;
  gap: 7px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.period-scroll::-webkit-scrollbar { display: none; }
.period-btn {
  flex-shrink: 0;
  padding: 8px 16px;
  border: 1.5px solid #e0e0e0;
  border-radius: 20px;
  background: #fff;
  font-size: 13px; font-weight: 500;
  cursor: pointer; white-space: nowrap;
  color: #555;
}
.period-btn.active { background: #5b6af0; color: #fff; border-color: #5b6af0; }

/* 日付範囲選択 */
.date-range-bar {
  background: #f8f8f8;
  border-bottom: 1px solid #eee;
  padding: 10px 14px;
  display: none;
  gap: 8px;
  align-items: center;
}
.date-range-bar.visible { display: flex; }
.date-range-bar input[type="date"] {
  flex: 1; border: 1.5px solid #e0e0e0;
  border-radius: 10px; padding: 8px 10px;
  font-size: 14px; outline: none;
  background: #fff; -webkit-appearance: none;
  color: #333;
}
.date-range-bar input[type="date"]:focus { border-color: #5b6af0; }
.date-range-sep { color: #aaa; font-size: 13px; }
.date-range-apply {
  padding: 8px 14px; border: none;
  border-radius: 10px; background: #5b6af0;
  color: #fff; font-size: 13px; font-weight: 600;
  cursor: pointer;
}

/* チャートコンテナ */
.chart-body { padding: 14px; }
.chart-card {
  background: #fff; border-radius: 16px;
  padding: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  margin-bottom: 14px;
}
.chart-card-title { font-size: 13px; font-weight: 600; color: #888; margin-bottom: 4px; }
.chart-period-label { font-size: 12px; color: #bbb; margin-bottom: 14px; }
.chart-canvas-wrap { max-width: 240px; margin: 0 auto 18px; }
.no-data { text-align: center; padding: 40px 0; color: #ccc; font-size: 14px; }

/* 凡例テーブル */
.legend-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.legend-table th { color: #bbb; font-weight: 500; padding: 5px 4px; border-bottom: 1px solid #f0f0f0; font-size: 11px; text-align: left; }
.legend-table td { padding: 9px 4px; border-bottom: 1px solid #f7f7f7; vertical-align: middle; }
.legend-dot { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 6px; vertical-align: middle; flex-shrink: 0; }
.legend-name { display: flex; align-items: center; }
.legend-time { font-weight: 700; color: #333; }
.legend-pct { font-weight: 700; color: #5b6af0; }
.chart-total { text-align: center; margin-top: 14px; font-size: 13px; color: #aaa; }
.chart-total strong { color: #333; }
</style>
</head>
<body>

<!-- ナビ -->
<nav class="nav">
  <button class="nav-btn active" id="nav-tasks" onclick="showPage('tasks')">
    <span class="nav-icon">⏱</span>タスク
  </button>
  <button class="nav-btn" id="nav-chart" onclick="showPage('chart')">
    <span class="nav-icon">📊</span>レポート
  </button>
</nav>

<!-- タスクページ -->
<div class="page active" id="page-tasks">
  <div class="header">
    <div class="header-date" id="hdr-date"></div>
    <div class="header-title">タイムトラッカー</div>
    <div class="header-sub" id="hdr-sub"></div>
  </div>
  <div class="task-list" id="task-list"></div>
</div>

<!-- レポートページ -->
<div class="page" id="page-chart">
  <div class="header">
    <div class="header-date" id="chart-hdr-date"></div>
    <div class="header-title">レポート</div>
    <div class="header-sub" id="chart-hdr-sub"></div>
  </div>

  <div class="period-scroll">
    <button class="period-btn active" id="pb-today"   onclick="setPeriod('today')">今日</button>
    <button class="period-btn"        id="pb-7"       onclick="setPeriod('7')">7日間</button>
    <button class="period-btn"        id="pb-30"      onclick="setPeriod('30')">30日間</button>
    <button class="period-btn"        id="pb-week"    onclick="setPeriod('week')">今週</button>
    <button class="period-btn"        id="pb-month"   onclick="setPeriod('month')">今月</button>
    <button class="period-btn"        id="pb-range"   onclick="setPeriod('range')">範囲指定</button>
  </div>

  <div class="date-range-bar" id="range-bar">
    <input type="date" id="range-from">
    <span class="date-range-sep">〜</span>
    <input type="date" id="range-to">
    <button class="date-range-apply" onclick="applyRange()">適用</button>
  </div>

  <div class="chart-body" id="chart-body"></div>
</div>

<!-- FAB -->
<button class="fab" id="fab-add">＋</button>

<!-- タスク追加モーダル -->
<div class="modal-overlay" id="modal-add">
  <div class="modal">
    <div class="modal-title">タスクを追加</div>
    <label>タスク名</label>
    <input type="text" id="new-task-name" placeholder="例：仕事、読書、運動..." maxlength="20">
    <label>アイコン</label>
    <div class="emoji-grid" id="emoji-grid"></div>
    <label>カラー</label>
    <div class="color-grid" id="color-grid"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-add')">キャンセル</button>
      <button class="btn btn-primary" onclick="addTask()">追加</button>
    </div>
  </div>
</div>

<!-- 削除確認モーダル -->
<div class="modal-overlay" id="modal-del">
  <div class="modal">
    <div class="modal-title">タスクを削除</div>
    <p style="color:#777;margin-bottom:20px;line-height:1.7;font-size:14px;">このタスクと<strong>すべての記録データ</strong>が削除されます。<br>元に戻せません。</p>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-del')">キャンセル</button>
      <button class="btn btn-danger" onclick="confirmDelete()">削除する</button>
    </div>
  </div>
</div>

<script>
// ─── 定数 ───
const COLORS = ['#5b6af0','#ff6b6b','#ffa94d','#51cf66','#339af0','#cc5de8','#f06595','#20c997','#fd7e14','#74c0fc','#a9e34b','#e599f7'];
const EMOJIS = ['💼','📚','🏃','🍽','😴','🎮','🎵','✏️','💪','🧘','🌿','🚗','📱','💬','🛒','🧹','💰','🎨','✈️','❤️','⭐','🔥'];

// ─── 状態 ───
let tasks   = JSON.parse(localStorage.getItem('tt_tasks')   || '[]');
let records = JSON.parse(localStorage.getItem('tt_records') || '[]');
let active  = JSON.parse(localStorage.getItem('tt_active')  || 'null');

let selColor = COLORS[0];
let selEmoji = EMOJIS[0];
let delTargetId = null;
let chartPeriod = 'today';
let rangeFrom = '', rangeTo = '';
let pieChart = null;
let ticker = null;

// ─── 初期化 ───
function init() {
  updateDates();
  document.getElementById('fab-add').addEventListener('click', openAddModal);
  document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) closeModal(el.id); });
  });
  renderTasks();
  startTick();
}

function updateDates() {
  const s = fmtDateLong(new Date());
  document.getElementById('hdr-date').textContent = s;
  document.getElementById('chart-hdr-date').textContent = s;
}

// ─── ページ切替 ───
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  document.getElementById('fab-add').style.display = (name === 'tasks') ? 'flex' : 'none';
  if (name === 'chart') renderChart();
}

// ─── タスク描画 ───
function renderTasks() {
  const el = document.getElementById('task-list');
  if (tasks.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⏱</div><div class="empty-text">右下の＋ボタンで<br>タスクを追加してください</div></div>`;
    document.getElementById('hdr-sub').textContent = '';
    return;
  }
  const todayTot = getTodayTotalSec();
  const runSec = active ? Math.floor((Date.now() - active.startTime) / 1000) : 0;
  document.getElementById('hdr-sub').textContent = (todayTot + runSec) > 0 ? `今日の合計：${fmt(todayTot + runSec)}` : '今日の記録：まだなし';

  el.innerHTML = tasks.map(t => {
    const running = active && active.taskId === t.id;
    const elapsed = running ? Math.floor((Date.now() - active.startTime) / 1000) : 0;
    const todaySec = getTodaySecFor(t.id) + elapsed;
    return `<div class="task-card${running ? ' running' : ''}" id="card-${t.id}" onclick="toggleTimer('${t.id}')">
      <div class="task-dot" style="background:${t.color}22;">${t.emoji}</div>
      <div class="task-info">
        <div class="task-name">${esc(t.name)}</div>
        <div class="task-today-label">今日 ${fmt(todaySec)}</div>
      </div>
      <div class="task-right">
        <div class="timer-disp" id="td-${t.id}">${running ? fmt(elapsed) : '00:00:00'}</div>
        <button class="play-btn ${running ? 'stop' : 'start'}">${running ? '■' : '▶'}</button>
      </div>
      <button class="del-btn" onclick="event.stopPropagation();askDel('${t.id}')">✕</button>
    </div>`;
  }).join('');
}

// ─── タイマー ───
function toggleTimer(taskId) {
  const now = Date.now();
  if (active) {
    const dur = Math.floor((now - active.startTime) / 1000);
    if (dur > 0) {
      records.push({ id: genId(), taskId: active.taskId, startTime: active.startTime, endTime: now, duration: dur, date: todayStr() });
      saveRec();
    }
    if (active.taskId === taskId) { active = null; localStorage.removeItem('tt_active'); renderTasks(); return; }
  }
  active = { taskId, startTime: now };
  localStorage.setItem('tt_active', JSON.stringify(active));
  renderTasks();
}

function startTick() {
  if (ticker) clearInterval(ticker);
  ticker = setInterval(() => {
    if (!active) return;
    const el = document.getElementById('td-' + active.taskId);
    if (!el) return;
    const e = Math.floor((Date.now() - active.startTime) / 1000);
    el.textContent = fmt(e);
    const todayTot = getTodayTotalSec();
    const sub = document.getElementById('hdr-sub');
    if (sub) sub.textContent = `今日の合計：${fmt(todayTot + e)}`;
  }, 1000);
}

// ─── モーダル ───
function openModal(id)  { const el = document.getElementById(id); el.style.display = 'flex'; }
function closeModal(id) { const el = document.getElementById(id); el.style.display = 'none'; }

function openAddModal() {
  selColor = COLORS[tasks.length % COLORS.length];
  selEmoji = EMOJIS[tasks.length % EMOJIS.length];
  document.getElementById('new-task-name').value = '';
  renderColorGrid();
  renderEmojiGrid();
  openModal('modal-add');
  setTimeout(() => document.getElementById('new-task-name').focus(), 150);
}
function renderColorGrid() {
  document.getElementById('color-grid').innerHTML = COLORS.map(c =>
    `<div class="color-opt${c===selColor?' selected':''}" style="background:${c}" onclick="selC('${c}')"></div>`).join('');
}
function renderEmojiGrid() {
  document.getElementById('emoji-grid').innerHTML = EMOJIS.map(e =>
    `<div class="emoji-opt${e===selEmoji?' selected':''}" onclick="selE('${e}')">${e}</div>`).join('');
}
function selC(c) { selColor = c; renderColorGrid(); }
function selE(e) { selEmoji = e; renderEmojiGrid(); }

function addTask() {
  const name = document.getElementById('new-task-name').value.trim();
  if (!name) { alert('タスク名を入力してください'); return; }
  tasks.push({ id: genId(), name, color: selColor, emoji: selEmoji });
  saveTasks();
  closeModal('modal-add');
  renderTasks();
}

function askDel(id) { delTargetId = id; openModal('modal-del'); }
function confirmDelete() {
  if (!delTargetId) return;
  if (active && active.taskId === delTargetId) { active = null; localStorage.removeItem('tt_active'); }
  tasks   = tasks.filter(t => t.id !== delTargetId);
  records = records.filter(r => r.taskId !== delTargetId);
  saveTasks(); saveRec();
  delTargetId = null;
  closeModal('modal-del');
  renderTasks();
}

// ─── レポート ───
function setPeriod(p) {
  chartPeriod = p;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pb-' + p).classList.add('active');
  const rangeBar = document.getElementById('range-bar');
  if (p === 'range') {
    rangeBar.classList.add('visible');
    // デフォルト: 過去7日
    if (!rangeFrom) rangeFrom = dateStr(daysBefore(6));
    if (!rangeTo)   rangeTo   = dateStr(new Date());
    document.getElementById('range-from').value = rangeFrom;
    document.getElementById('range-to').value   = rangeTo;
  } else {
    rangeBar.classList.remove('visible');
    renderChart();
  }
}

function applyRange() {
  rangeFrom = document.getElementById('range-from').value;
  rangeTo   = document.getElementById('range-to').value;
  if (!rangeFrom || !rangeTo) { alert('日付を選択してください'); return; }
  if (rangeFrom > rangeTo) { alert('開始日は終了日より前にしてください'); return; }
  renderChart();
}

function renderChart() {
  if (!document.getElementById('page-chart').classList.contains('active')) return;
  const { from, to, label } = getPeriodRange();
  document.getElementById('chart-hdr-sub').textContent = label;

  const body = document.getElementById('chart-body');
  const data = getChartData(from, to);

  if (data.length === 0) {
    body.innerHTML = `<div class="chart-card"><div class="no-data">📭<br>この期間の記録はありません</div></div>`;
    if (pieChart) { pieChart.destroy(); pieChart = null; }
    return;
  }

  const total = data.reduce((s, d) => s + d.sec, 0);
  body.innerHTML = `
    <div class="chart-card">
      <div class="chart-card-title">時間配分</div>
      <div class="chart-period-label">${label}</div>
      <div class="chart-canvas-wrap"><canvas id="pie-cv"></canvas></div>
      <table class="legend-table">
        <thead><tr><th>タスク</th><th>時間</th><th>割合</th></tr></thead>
        <tbody>${data.map(d => `
          <tr>
            <td><div class="legend-name"><span class="legend-dot" style="background:${d.color}"></span>${esc(d.name)}</div></td>
            <td class="legend-time">${fmt(d.sec)}</td>
            <td class="legend-pct">${Math.round(d.sec/total*100)}%</td>
          </tr>`).join('')}
        </tbody>
      </table>
      <div class="chart-total">合計 <strong>${fmt(total)}</strong></div>
    </div>`;

  if (pieChart) pieChart.destroy();
  pieChart = new Chart(document.getElementById('pie-cv'), {
    type: 'doughnut',
    data: {
      labels: data.map(d => d.name),
      datasets: [{ data: data.map(d => d.sec), backgroundColor: data.map(d => d.color), borderWidth: 3, borderColor: '#fff' }]
    },
    options: {
      responsive: true, cutout: '55%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${fmt(ctx.raw)}  ${Math.round(ctx.raw/total*100)}%` } }
      }
    }
  });
}

function getPeriodRange() {
  const now = new Date();
  let from, to, label;
  if (chartPeriod === 'today') {
    from = dateStr(now); to = dateStr(now);
    label = '今日 ' + fmtDateShort(now);
  } else if (chartPeriod === '7') {
    from = dateStr(daysBefore(6)); to = dateStr(now);
    label = `${fmtDateShort(daysBefore(6))} 〜 ${fmtDateShort(now)}（7日間）`;
  } else if (chartPeriod === '30') {
    from = dateStr(daysBefore(29)); to = dateStr(now);
    label = `${fmtDateShort(daysBefore(29))} 〜 ${fmtDateShort(now)}（30日間）`;
  } else if (chartPeriod === 'week') {
    const d = new Date(now);
    const dow = d.getDay() === 0 ? 6 : d.getDay() - 1;
    d.setDate(d.getDate() - dow);
    from = dateStr(d); to = dateStr(now);
    label = `今週 ${fmtDateShort(d)} 〜 ${fmtDateShort(now)}`;
  } else if (chartPeriod === 'month') {
    const d = new Date(now.getFullYear(), now.getMonth(), 1);
    from = dateStr(d); to = dateStr(now);
    label = `今月 ${now.getFullYear()}年${now.getMonth()+1}月`;
  } else {
    from = rangeFrom; to = rangeTo;
    label = `${rangeFrom} 〜 ${rangeTo}`;
  }
  return { from, to, label };
}

function getChartData(from, to) {
  let recs = records.filter(r => r.date >= from && r.date <= to);
  // 実行中タイマーも加算
  if (active) {
    const d = todayStr();
    if (d >= from && d <= to) {
      const elapsed = Math.floor((Date.now() - active.startTime) / 1000);
      recs = [...recs, { taskId: active.taskId, duration: elapsed, date: d }];
    }
  }
  const map = {};
  recs.forEach(r => { map[r.taskId] = (map[r.taskId] || 0) + r.duration; });
  return tasks
    .filter(t => map[t.id])
    .map(t => ({ name: t.name, color: t.color, sec: map[t.id] }))
    .sort((a, b) => b.sec - a.sec);
}

// ─── ユーティリティ ───
function fmt(sec) {
  const h = String(Math.floor(sec / 3600)).padStart(2,'0');
  const m = String(Math.floor((sec % 3600) / 60)).padStart(2,'0');
  const s = String(sec % 60).padStart(2,'0');
  return `${h}:${m}:${s}`;
}
function todayStr() { return dateStr(new Date()); }
function dateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function daysBefore(n) { const d = new Date(); d.setDate(d.getDate() - n); return d; }
function fmtDateLong(d)  { return d.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long'}); }
function fmtDateShort(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
function getTodaySecFor(taskId) { return records.filter(r => r.taskId===taskId && r.date===todayStr()).reduce((s,r)=>s+r.duration,0); }
function getTodayTotalSec()     { return records.filter(r => r.date===todayStr()).reduce((s,r)=>s+r.duration,0); }
function genId() { return Math.random().toString(36).slice(2)+Date.now().toString(36); }
function esc(s) { return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function saveTasks() { localStorage.setItem('tt_tasks',   JSON.stringify(tasks)); }
function saveRec()   { localStorage.setItem('tt_records', JSON.stringify(records)); }

init();
</script>
